<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Orbital Risk Analyzer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f0f2f5;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    width: 100%;
    max-width: 500px;
    background: white;
    border-radius: 20px;
    padding: 40px 36px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.10);
  }
  h1 {
    text-align: center;
    color: #1a73e8;
    font-size: 20px;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 32px;
  }
  .field { margin-bottom: 22px; }
  .field label {
    display: block;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #5f6368;
    margin-bottom: 8px;
  }
  .search-input {
    width: 100%;
    padding: 14px 16px;
    border: 2px solid #e0e0e0;
    border-radius: 12px;
    font-size: 15px;
    color: #3c4043;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    background: white;
  }
  .search-input:focus {
    border-color: #1a73e8;
    box-shadow: 0 0 0 3px rgba(26,115,232,0.10);
  }
  .search-input::placeholder { color: #bdc1c6; }
  .dropdown { position: relative; margin-top: 6px; }
  .dropdown-list {
    display: none;
    position: absolute;
    top: 100%; left: 0; right: 0;
    background: white;
    border: 2px solid #e0e0e0;
    border-radius: 12px;
    max-height: 200px;
    overflow-y: auto;
    z-index: 100;
    box-shadow: 0 8px 24px rgba(0,0,0,0.10);
    margin-top: 4px;
  }
  .dropdown-list.open { display: block; }
  .dropdown-item {
    padding: 11px 16px;
    font-size: 14px;
    color: #3c4043;
    cursor: pointer;
    border-bottom: 1px solid #f5f5f5;
    transition: background 0.12s;
  }
  .dropdown-item:last-child { border-bottom: none; }
  .dropdown-item:hover, .dropdown-item.selected { background: #e8f0fe; color: #1a73e8; }
  .dropdown-item.no-results { color: #bdc1c6; cursor: default; font-style: italic; }

  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 4px 0 22px;
    color: #bdc1c6;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .divider::before, .divider::after {
    content: "";
    flex: 1;
    height: 1px;
    background: #e0e0e0;
  }

  /* Risk bar */
  .risk-bar-wrap {
    display: none;
    margin: 16px 0 4px;
    height: 8px;
    border-radius: 99px;
    background: #e0e0e0;
    overflow: hidden;
  }
  .risk-bar-fill {
    height: 100%;
    border-radius: 99px;
    transition: width 0.4s, background 0.4s;
  }

  .result-section {
    margin-top: 28px;
    padding-top: 28px;
    border-top: 1px solid #f0f0f0;
  }
  .result-box {
    border-radius: 14px;
    padding: 28px 20px 22px;
    text-align: center;
    background: #f8f9fa;
    border: 2px solid #e0e0e0;
    transition: all 0.25s;
  }
  .result-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #9aa0a6;
    margin-bottom: 10px;
  }
  .result-value {
    font-size: 42px;
    font-weight: 900;
    color: #bdc1c6;
    letter-spacing: 1px;
  }
  .result-unit {
    font-size: 18px;
    font-weight: 700;
    opacity: 0.7;
  }
  .result-sub {
    font-size: 11px;
    color: #9aa0a6;
    margin-top: 10px;
  }

  /* State: default */
  .state-default .result-label { color: #9aa0a6; }
  .state-default .result-value { color: #bdc1c6; font-size: 20px; }

  /* State: safe (0–33%) */
  .state-safe { background: #e6f4ea; border-color: #34a853; }
  .state-safe .result-label { color: #34a853; }
  .state-safe .result-value { color: #34a853; }

  /* State: medium (33–66%) */
  .state-medium { background: #fef7e0; border-color: #fbbc04; }
  .state-medium .result-label { color: #f9a825; }
  .state-medium .result-value { color: #f9a825; }

  /* State: high (66–100%) */
  .state-high { background: #fce8e6; border-color: #ea4335; }
  .state-high .result-label { color: #ea4335; }
  .state-high .result-value { color: #ea4335; }

  /* State: no data */
  .state-nodata { background: #f8f9fa; border-color: #dadce0; }
  .state-nodata .result-label { color: #9aa0a6; }
  .state-nodata .result-value { color: #9aa0a6; font-size: 18px; }

  /* State: error */
  .state-error { background: #f1f3f4; border-color: #dadce0; }
  .state-error .result-value { color: #5f6368; font-size: 16px; }

  .badge {
    text-align: center;
    font-size: 10px;
    color: #bdc1c6;
    margin-top: 18px;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>
<div class="card">

      </div>

  </div>

  <div class="badge" id="badge"></div>
</div>

let selected = [null, null];

function getKey(i, j) {
  const a = Math.min(i, j), b = Math.max(i, j);
  return a + "," + b;
}

function renderDropdown(n, query) {
  const list = document.getElementById("list" + n);
  list.innerHTML = "";
  const q = (query || "").toLowerCase();
  let count = 0;
  for (let i = 0; i < SATS.length; i++) {
    if (!q || SATS[i].toLowerCase().includes(q)) {
      const div = document.createElement("div");
      div.className = "dropdown-item" + (selected[n-1] === i ? " selected" : "");
      div.textContent = SATS[i];
      div.addEventListener("mousedown", () => selectSat(n, i));
      list.appendChild(div);
      if (++count >= 100) break;
    }
  }
  if (count === 0) {
    const div = document.createElement("div");
    div.className = "dropdown-item no-results";
    div.textContent = "No satellites found";
    list.appendChild(div);
  }
}

function openDropdown(n) {
  renderDropdown(n, document.getElementById("search" + n).value);
  document.getElementById("list" + n).classList.add("open");
}

function delayClose(n) {
  setTimeout(() => document.getElementById("list" + n).classList.remove("open"), 180);
}

function filterDropdown(n) {
  const q = document.getElementById("search" + n).value;
  renderDropdown(n, q);
  document.getElementById("list" + n).classList.add("open");
  if (selected[n-1] !== null && !SATS[selected[n-1]].toLowerCase().includes(q.toLowerCase())) {
    selected[n-1] = null;
    updateResult();
  }
}

function selectSat(n, idx) {
  selected[n-1] = idx;
  document.getElementById("search" + n).value = SATS[idx];
  document.getElementById("list" + n).classList.remove("open");
  updateResult();
}

function setResult(state, labelText, valueHTML, subText, barPct) {
  const box = document.getElementById("result-box");
  box.className = "result-box " + state;
  document.getElementById("result-label").textContent = labelText;
  document.getElementById("result-value").innerHTML = valueHTML;
  document.getElementById("result-sub").textContent = subText;

  const barWrap = document.getElementById("risk-bar-wrap");
  const barFill = document.getElementById("risk-bar-fill");
  if (barPct !== null) {
    barWrap.style.display = "block";
    barFill.style.width = barPct + "%";
    const color = barPct < 33 ? "#34a853" : barPct < 66 ? "#fbbc04" : "#ea4335";
    barFill.style.background = color;
  } else {
    barWrap.style.display = "none";
  }
}

function updateResult() {
  const i = selected[0], j = selected[1];

  if (i === null || j === null) {
    setResult("state-default", "Collision Probability", "SELECT SATELLITES", "Choose two satellites above", null);
    return;
  }
  if (i === j) {
    setResult("state-error", "Error", "SAME SATELLITE", "Please select two different satellites", null);
    return;
  }

  const key = getKey(i, j);
  const raw = PAIRS[key];

  if (raw === undefined || raw === null || raw === "") {
    setResult("state-nodata", "Collision Probability", "NO DATA FOUND",
      SATS[i] + " ↔ " + SATS[j], null);
    return;
  }

  const prob = parseFloat(raw);
  const pct = prob * 100;

  // Display: show raw value (0–1) large, percentage below
  const displayVal = prob % 1 === 0
    ? prob.toFixed(0)          // 0 or 1 → show as integer
    : prob.toFixed(4);         // decimals → show 4dp

  const pctStr = pct.toFixed(2) + "%";
  const valueHTML = displayVal + '<span class="result-unit"> (' + pctStr + ')</span>';

  let state;
  if (pct < 33) state = "state-safe";
  else if (pct < 66) state = "state-medium";
  else state = "state-high";

  const label = pct < 33 ? "Low Risk" : pct < 66 ? "Moderate Risk" : "High Risk";

  setResult(state, label, valueHTML,
    SATS[i] + " ↔ " + SATS[j], pct);
}

document.getElementById("badge").textContent =
  SATS.length.toLocaleString() + " satellites · " +
  Object.keys(PAIRS).length.toLocaleString() + " pairs with data";
</script>
</body>
</html>

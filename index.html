<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; padding: 20px; background-color: #f0f2f5; color: #3c4043; }
    .card { max-width: 480px; margin: 40px auto; background: white; padding: 35px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    h2 { margin-top: 0; color: #1a73e8; font-size: 18px; text-align: center; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 1px; }

    .input-section { margin-bottom: 25px; }
    label { display: block; font-size: 11px; font-weight: 700; color: #5f6368; text-transform: uppercase; margin-bottom: 8px; }

    input { width: 100%; padding: 14px; border: 2px solid #dfe1e5; border-radius: 10px; font-size: 16px; box-sizing: border-box; outline: none; }
    input:focus { border-color: #1a73e8; box-shadow: 0 0 0 3px rgba(26,115,232,0.1); }

    .risk-container { margin-top: 35px; text-align: center; border-top: 1px solid #eee; padding-top: 25px; }
    #risk-box {
      padding: 24px; border-radius: 12px; font-size: 20px; font-weight: 900; color: white;
      text-transform: uppercase; background-color: #bdc1c6; min-height: 40px;
      transition: background-color 0.2s;
    }
    .bg-low  { background-color: #34a853 !important; }
    .bg-mid  { background-color: #fbbc04 !important; color: #333 !important; }
    .bg-high { background-color: #ea4335 !important; }
    .bg-grey { background-color: #bdc1c6 !important; }

    .badge { text-align: center; font-size: 10px; color: #bdc1c6; margin-top: 16px; }
  </style>
</head>
<body>
<div class="card">
  <h2>Orbital Risk Analyzer</h2>

  <div class="input-section">
    <label>Satellite A</label>
    <input list="list-sats" id="sat1" placeholder="Search first satellite..." autocomplete="off">
  </div>
  <div class="input-section">
    <label>Satellite B</label>
    <input list="list-sats" id="sat2" placeholder="Search second satellite..." autocomplete="off">
  </div>
  <datalist id="list-sats"></datalist>

  <div class="risk-container">
    <div id="risk-box" class="bg-grey">LOADING DATA...</div>
  </div>
  <div class="badge" id="badge"></div>
</div>

<script>

  
  const SHEET_ID = "1Xo6oSmDzJvRmZ6sibyM34MXb0OlUT-whAIW5sfG_9MY";
  const GID      = "669546549";
  const CSV_URL  = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;

  
  let pairMap = {};

  //parsing and loading
  async function loadData() {
    const box = document.getElementById('risk-box');
    try {
      const res  = await fetch(CSV_URL, { redirect: "follow" });
      if (!res.ok) 
      {throw new Error("HTTP " + res.status);}
      const text = await res.text();

      const allSatSet = new Set();
      pairMap = {};

      const rows = text.split(/\r?\n/).filter(l => l.trim());
      rows.slice(1).forEach(row => {
        
        //csv parsing
        const cols = [];
        let cur = "", inQ = false;
        for (const c of row) 
        {
          if (c === '"') 
          { inQ = !inQ; }
          else if (c === ',' && !inQ) 
          { cols.push(cur.trim()); cur = ""; }
          else cur += c;
        }
        cols.push(cur.trim());

        const s1  = cols[0] || "";
        const s2  = cols[1] || "";
        const raw = cols[2] || "";
        if (!s1 || !s2) return;

        allSatSet.add(s1);
        allSatSet.add(s2);

        //checking for collision prob value
        if (raw !== "") 
        {
          const val = parseFloat(raw);
          if (!isNaN(val)) 
          {
            //order of names does not matter
            const key = [s1, s2].sort().join("|||");
            pairMap[key] = val;
          }
        }
      });

      //populating dtatlist
      const allSats = [...allSatSet].sort();
      const datalist = document.getElementById('list-sats');
      datalist.innerHTML = "";
      allSats.forEach(name => 
      {
        const opt = document.createElement('option');
        opt.value = name;
        datalist.appendChild(opt);
      });

      const pairCount = Object.keys(pairMap).length;
      document.getElementById('badge').textContent =
        allSats.length.toLocaleString() + " satellites · " +
        pairCount.toLocaleString() + " pairs with data";

      box.innerText = "SELECT SATELLITES";
      box.className = "bg-grey";

    } 
    catch(e) 
    {
      box.innerText = "ERROR LOADING DATA";
      box.className = "bg-high";
      console.error(e);
    }
  }

  //collision risk checking
  function checkRisk() {
    const val1 = document.getElementById('sat1').value.trim();
    const val2 = document.getElementById('sat2').value.trim();
    const box  = document.getElementById('risk-box');
    box.className = "";

    if (!val1 || !val2) {
      box.innerText = "SELECT SATELLITES";
      box.className = "bg-grey";
      return;
    }

    if (val1 === val2) {
      box.innerText = "SAME SATELLITE";
      box.className = "bg-high";
      return;
    }

    //sorting names to match stored key
    const key  = [val1, val2].sort().join("|||");
    const risk = pairMap[key];

    //shows if no collision data is found on csv
    if (risk === undefined || risk === null) {
      box.innerText = "NO DATA FOUND";
      box.className = "bg-grey";
      return;
    }

    
    const pct = risk * 100; // percentage

    box.innerText = pct.toFixed(2) + "% COLLISION RISK";

    if(pct < 33) 
    {box.className = "bg-low";}
    else if (pct < 66)
    {box.className = "bg-mid";}
    else 
    {box.className = "bg-high";}
  }

  // ── Events ─────────────────────────────────────────────────────────────
  document.getElementById('sat1').addEventListener('input', checkRisk);
  document.getElementById('sat2').addEventListener('input', checkRisk);

  loadData();
</script>
</body>
</html>
